<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 비밀 사이트</title>
    <link rel="stylesheet" href="style.css"> <!-- 디자인 연결 -->
</head>
<body>
    <div class="top-deco"></div>

    <div class="container">
        <!-- 왼쪽 메뉴 영역 -->
        <nav class="sidebar">
            <a href="news.html" target="main-view" class="menu-item active"> ღ✨뉴스ɞ*ﾟ❣.｡ღ</a>
            <a href="diary.html" target="main-view" class="menu-item active">❤️ 일기</a>
            <a href="photo.html" target="main-view" class="menu-item">💖 사진</a>
            <a href="goods.html" target="main-view" class="menu-item">💫 굿즈</a>
        </nav>

        <!-- 오른쪽 메인 콘텐츠 영역: iframe이 창문 역할을 함 -->
        <main class="content">
            <iframe src="diary.html" name="main-view" width="100%" height="800px" frameborder="0"></iframe>
        </main>
    </div>
    <!-- 여기에 붙여넣으세요 -->
    <script>
        // 1. 모든 메뉴 아이템들을 다 불러옵니다.
        const menuItems = document.querySelectorAll('.menu-item');

        // 2. 각 메뉴를 클릭했을 때 벌어질 일을 정합니다.
        menuItems.forEach(item => {
            item.addEventListener('click', function() {
                // (1) 일단 모든 메뉴에서 'active'(분홍색) 이름표를 뗍니다.
                menuItems.forEach(m => m.classList.remove('active'));
                
                // (2) 지금 내가 클릭한 이 메뉴에만 'active' 이름표를 딱 붙입니다!
                this.classList.add('active');
            });
        });
    </script>
</body>
</body>
</html>
